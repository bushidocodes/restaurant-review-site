<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Info</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-mobile-web-app-status-bar-style" content="white">
  <link rel="apple-mobile-web-app-title" content="Restaurant Reviews">
  <link rel="apple-touch-icon" href="/img/icons/apple-touch-icon-60x60.png" sizes="60x60">
  <link rel="apple-touch-icon" href="/img/icons/apple-touch-icon-76x76.png" sizes="76x76">
  <link rel="apple-touch-icon" href="/img/icons/apple-touch-icon-120x120.png" sizes="120x120">
  <link rel="apple-touch-icon" href="/img/icons/apple-touch-icon-152x152.png" sizes="152x152">
  <meta name="theme-color" content="#3f51b5">
  <link rel="icon" type="image/png" sizes="96x96" href="/img/icons/icon-96x96.png">
  <link rel="stylesheet" href="/css/normalize.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="inside">
  <header>
    <div id="titlebar">
      <h1>
        <a tabindex="0" href="/">Restaurant Reviews</a>
      </h1>
    </div>
    <nav aria-label="Breadcrumb">
      <ol id="breadcrumb">
        <li>
          <a tabindex="0" href="/">Home</a>
        </li>
      </ol>
    </nav>
    <button tabindex="0" id="maptoggle" type="button" role="button" aria-label="Toggle map" aria-pressed="false">Toggle Map</button>
  </header>

  <main id="maincontent">
    <section id="map-container" role="application" aria-roledescription="Map" tabindex="-1">
      <div id="map"></div>
    </section>
    <section id="restaurant-container">
      <h2 id="restaurant-name"></h2>
      <img id="restaurant-img">
      <p id="restaurant-cuisine"></p>
      <p id="restaurant-address"></p>
      <table id="restaurant-hours"></table>
    </section>
    <section id="reviews-container">
      <h2>Reviews</h2>
      <button tabindex="0" id="add-review-btn">Add Review</button>
      <ul id="reviews-list"></ul>
    </section>
  </main>

  <div id="create-review" class="dialog-overlay" hidden>
    <form id="create-review-form" class="dialog" role="dialog" aria-labelledby="dialog-title">
      <h2 id="dialog-title">Create Review</h2>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" autocomplete="name" required>
      <label for="rating">Rating:</label>
      <input type="number" name="rating" id="rating" min="1" max="5" step="1" required>
      <label for="comments">Comments:</label>
      <textarea cols="30" rows="10" id="comments" name="comments" required></textarea>
      <div id="button-row">
        <button id="close-create-review-modal-btn">
          <strong>Cancel</strong>
        </button>
        <button type="reset">
          <strong>Reset</strong>
        </button>
        <button type="submit" id="create-review-submit-btn">
          <strong>Submit</strong>
        </button>
      </div>
    </form>
  </div>

  <footer id="footer">
    <div class="center">
      Copyright (c) 2026
      <a tabindex="0" href="/">
        <strong>Restaurant Reviews</strong>
      </a> All Rights Reserved.
    </div>
  </footer>

  <script type="module" src="/js/restaurant_info.js"></script>

</body>

</html>
