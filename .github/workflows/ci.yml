name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build:ui

      - name: Smoke-test API
        run: |
          node --import tsx app.ts &
          API_PID=$!
          trap "kill $API_PID 2>/dev/null" EXIT
          for i in $(seq 1 30); do
            if ! kill -0 $API_PID 2>/dev/null; then
              echo "API server exited unexpectedly" && exit 1
            fi
            curl -sf http://localhost:1337/healthcheck >/dev/null && break
            sleep 1
          done
          # Assert the seeded restaurants endpoint returns a non-empty JSON array.
          curl -sf http://localhost:1337/restaurants | node -e "
            let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              const a=JSON.parse(d);
              if (!Array.isArray(a) || a.length === 0) { console.error('Expected non-empty array'); process.exit(1); }
              console.log('API smoke test OK:', a.length, 'restaurants');
            });
          "
        working-directory: restaurant-server
